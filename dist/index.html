      (function restoreRouteFromRedirect() {
        const currentUrl = new URL(window.location.href);
        const redirectedRoute = currentUrl.searchParams.get("__route");
        if (!redirectedRoute) return;
        currentUrl.searchParams.delete("__route");
        window.history.replaceState(null, "", redirectedRoute);
      })();
